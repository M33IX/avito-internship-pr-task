services:
  postgres:
    image: postgres:18
    container_name: avito-internship-postgres
    environment:
      POSTGRES_DB: pr_reviewer_assignment
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U postgres -d pr_reviewer_assignment",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: avito-internship-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_HOST: "0.0.0.0"
      APP_PORT: "8080"
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/pr_reviewer_assignment"
      DATABASE_ECHO: "false"
      DATABASE_POOL_SIZE: "5"
      DATABASE_MAX_OVERFLOW: "10"
    ports:
      - "8080:8080"
    command:
      - "sh"
      - "-c"
      - >
        uvicorn main:app --host 0.0.0.0 --port 8080
        2>&1 | tee -a /var/log/avito-internship/app.log
    volumes:
      - app_logs:/var/log/avito-internship
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: avito-internship-prometheus
    depends_on:
      - app
      - postgres-exporter
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: avito-internship-postgres-exporter
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@postgres:5432/pr_reviewer_assignment?sslmode=disable"
    ports:
      - "9187:9187"
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: avito-internship-loki
    command:
      - "-config.file=/etc/loki/local-config.yaml"
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: avito-internship-promtail
    depends_on:
      - loki
    command:
      - "-config.file=/etc/promtail/config.yml"
    volumes:
      - ./observability/promtail/config.yml:/etc/promtail/config.yml:ro
      - app_logs:/var/log/avito-internship:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: avito-internship-grafana
    depends_on:
      - prometheus
      - loki
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped

volumes:
  app_logs:
  postgres_data:
  prometheus_data:
  loki_data:
  grafana_data:
